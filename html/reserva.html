<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reserva</title>
	<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

	<a href="#main" class="skip-link" tabindex="1">Saltar al contenido</a>

	<header>
		<nav class="nav container" aria-label="Navegación principal">

			<div class="logo">
				<a href="index.html">Taxi Tenerife</a>
			</div>

			<ul id="nav-menu">
				<li><a href="index.html">Inicio</a></li>
				<li><a href="reserva.html">Reservar</a></li>
				<li><a href="gestion.html">Gestionar</a></li>
				<li><a href="contacto.html">Contacto</a></li>
			</ul>

			<button class="nav-toggle" aria-controls="nav-menu" aria-expanded="false" aria-label="Abrir menú">
				☰
			</button>

		</nav>
	</header>

	<main id="main">
		<h1 class="titulo-reserva">Reserva tu taxi</h1>

		<div class="form-container">
			<form id="reservaForm" novalidate aria-describedby="reserva-ayuda">
				<p id="reserva-ayuda">Los campos marcados con * son obligatorios. Revisa los datos antes de confirmar la
					reserva.</p>

				<fieldset>
					<legend>Datos del trayecto</legend>

					<label for="origen">Origen *</label>
					<select id="origen" name="origen" required aria-required="true" class="origen-select">
						<option value="">Selecciona origen</option>
						<option value="sur">Aeropuerto Tenerife Sur</option>
						<option value="norte">Aeropuerto Tenerife Norte</option>
					</select>

					<label for="destino">Destino *</label>
					<select id="destino" name="destino" required aria-required="true" class="destino-select">
						<option value="">Selecciona destino</option>
						<option value="laguna">La Laguna</option>
						<option value="santacruz">Santa Cruz</option>
						<option value="adeje">Adeje</option>
					</select>

					<label for="fecha">Fecha *</label>
					<input type="date" id="fecha" name="fecha" required aria-required="true" min="">

					<label for="hora">Selecciona la hora:</label>
					<input type="time" id="hora" name="hora">

					<label for="personas">Número de pasajeros *</label>
					<input type="number" id="personas" name="personas" min="1" max="8" inputmode="numeric" required
						aria-required="true">

				</fieldset>

				<fieldset>
					<legend>Datos de contacto</legend>

					<label for="email">Email *</label>
					<input type="email" id="email" name="email" autocomplete="email" required aria-required="true" placeholder="ejemplo@taxitenerife.com">

				</fieldset>

				<button class="btn" type="submit">Revisar reserva</button>

				<div id="errorBox" aria-live="assertive" role="alert"></div>

				<div id="reviewBox" hidden aria-live="polite"></div>

				<div id="formStatus" aria-live="assertive"></div>

			</form>
		</div>

	</main>

	<script src="../js/script.js"></script>
</body>

</html>
