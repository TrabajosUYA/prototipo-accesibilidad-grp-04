<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gestión de reservas</title>
	<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

	<a href="#main" class="skip-link" tabindex="1">Saltar al contenido</a>

	<header>
		<nav class="nav container" aria-label="Navegación principal">

			<div class="logo">
				<a href="index.html">Taxi Tenerife</a>
			</div>

			<ul id="nav-menu">
				<li><a href="index.html">Inicio</a></li>
				<li><a href="reserva.html">Reservar</a></li>
				<li><a href="gestion.html">Gestionar</a></li>
				<li><a href="contacto.html">Contacto</a></li>
			</ul>

			<button class="nav-toggle" aria-controls="nav-menu" aria-expanded="false" aria-label="Abrir menú">
				☰
			</button>

		</nav>
	</header>

	<main id="main">
		<h1 class="titulo-gestion">Gestionar reserva</h1>

		<div class="form-container">
			<form aria-describedby="gestion-ayuda">
				<p id="gestion-ayuda">Los campos marcados con * son obligatorios.</p>

				<label for="codigo">Código de reserva *</label>
				<input type="text" id="codigo" name="codigo" autocomplete="off" required aria-required="true">

				<label for="email">Email *</label>
				<input type="email" id="email" name="email" autocomplete="email" required aria-required="true" placeholder="ejemplo@taxitenerife.com">

				<button class="btn" type="submit">Buscar</button>
			</form>
		</div>


		<div class="table-container">
			<table>
				<caption>Detalles de la reserva</caption>
				<thead>
					<tr>
						<th scope="col">Origen</th>
						<th scope="col">Destino</th>
						<th scope="col">Fecha</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td>Aeropuerto Sur</td>
						<td>La Laguna</td>
						<td>20/03/2026</td>
					</tr>
				</tbody>
			</table>
		</div>

	</main>

	<script src="../js/script.js"></script>
</body>

</html>
