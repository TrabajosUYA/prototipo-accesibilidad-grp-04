<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    <header>
        <nav class="nav container" aria-label="Navegación principal">
            <div class="logo">
                <a href="index.html">Taxi Tenerife</a>
            </div>

            <!-- Menú principal -->
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="reserva.html">Reservar</a></li>
                <li><a href="gestion.html">Gestionar</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>

            <!-- Botón menú responsive (opcional) -->
            <button class="nav-toggle" aria-controls="nav-menu" aria-expanded="false" aria-label="Abrir menú">
                ☰
            </button>
        </nav>
    </header>

    <a href="#main" class="skip-link">Saltar al contenido</a>

    <main id="main">
        <h1 class="titulo-contacto">Contacto</h1>

        <div class="form-container">
            <form id="contactForm" novalidate>

                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" required>

                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" required></textarea>

                <button class="btn">Enviar</button>

                <div id="status" aria-live="polite" style="margin-top:10px; font-weight:bold;"></div>

            </form>
        </div>

    </main>

    <script src="../js/script.js"></script>
</body>

</html>
