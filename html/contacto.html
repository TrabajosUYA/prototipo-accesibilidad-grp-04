<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contacto</title>
	<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

	<a href="#main" class="skip-link" tabindex="1">Saltar al contenido</a>

	<header>
		<nav class="nav container" aria-label="Navegación principal">

			<div class="logo">
				<a href="index.html">Taxi Tenerife</a>
			</div>

			<ul id="nav-menu">
				<li><a href="index.html">Inicio</a></li>
				<li><a href="reserva.html">Reservar</a></li>
				<li><a href="gestion.html">Gestionar</a></li>
				<li><a href="contacto.html">Contacto</a></li>
			</ul>

			<button class="nav-toggle" aria-controls="nav-menu" aria-expanded="false" aria-label="Abrir menú">
				☰
			</button>

		</nav>
	</header>

	<main id="main">
		<h1 class="titulo-contacto">Contacto</h1>

		<div class="form-container">
			<form id="contactForm" novalidate aria-describedby="contacto-ayuda">
				<p id="contacto-ayuda">Los campos marcados con * son obligatorios.</p>

				<label for="nombre">Nombre *</label>
				<input type="text" id="nombre" name="nombre" autocomplete="name" required aria-required="true">

				<label for="mensaje">Mensaje *</label>
				<textarea id="mensaje" name="mensaje" required aria-required="true"></textarea>

				<button class="btn" type="submit">Enviar</button>

				<div id="status" aria-live="polite"></div>
			</form>
		</div>

	</main>

	<script src="../js/script.js"></script>
</body>

</html>
