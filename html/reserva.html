<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Reserva</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    <header>
        <nav class="nav container" aria-label="Navegación principal">
            <div class="logo">
                <a href="index.html">Taxi Tenerife</a>
            </div>

            <!-- Menú principal -->
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="reserva.html">Reservar</a></li>
                <li><a href="gestion.html">Gestionar</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>

            <!-- Botón menú responsive (opcional) -->
            <button class="nav-toggle" aria-controls="nav-menu" aria-expanded="false" aria-label="Abrir menú">
                ☰
            </button>
        </nav>
    </header>

    <a href="#main" class="skip-link">Saltar al contenido</a>

    <main id="main">
        <h1 class="titulo-reserva">Reserva tu taxi</h1>

        <div class="form-container">
            <form id="reservaForm" novalidate>

                <fieldset>
                    <legend>Datos del trayecto</legend>

                    <label for="origen">Origen</label>
                    <input type="text" id="origen" required aria-required="true">

                    <label for="destino">Destino</label>
                    <input type="text" id="destino" required>

                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha" required>

                    <label for="personas">Número de pasajeros</label>
                    <input type="number" id="personas" min="1" max="8">

                </fieldset>

                <fieldset>
                    <legend>Datos de contacto</legend>

                    <label for="email">Email</label>
                    <input type="email" id="email" required>

                </fieldset>

                <button class="btn" type="submit">Confirmar reserva</button>

                <div id="formStatus" aria-live="assertive" style="margin-top:10px; font-weight:bold;"></div>

            </form>
        </div>

    </main>

    <script src="../js/script.js"></script>
</body>

</html>
