<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de reservas</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    <header>
        <nav class="nav container" aria-label="Navegación principal">
            <div class="logo">
                <a href="index.html">Taxi Tenerife</a>
            </div>

            <!-- Menú principal -->
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="reserva.html">Reservar</a></li>
                <li><a href="gestion.html">Gestionar</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>

            <!-- Botón menú responsive (opcional) -->
            <button class="nav-toggle" aria-controls="nav-menu" aria-expanded="false" aria-label="Abrir menú">
                ☰
            </button>
        </nav>
    </header>

    <a href="#main" class="skip-link">Saltar al contenido</a>

    <main id="main">
        <h1>Gestionar reserva</h1>

        <div class="form-container">
            <form>
                <label for="codigo">Código de reserva</label>
                <input type="text" id="codigo" required>

                <label for="email">Email</label>
                <input type="email" id="email" required>

                <button class="btn">Buscar</button>
            </form>
        </div>


        <div class="table-container">
            <table>
                <caption>Detalles de la reserva</caption>
                <thead>
                    <tr>
                        <th scope="col">Origen</th>
                        <th scope="col">Destino</th>
                        <th scope="col">Fecha</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Aeropuerto Sur</td>
                        <td>La Laguna</td>
                        <td>20/03/2026</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <script src="../js/script.js"></script>
</body>

</html>
